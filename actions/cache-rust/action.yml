name: cache-rust
description: >-
  Point the Rust compiler at a shared sccache backed by the in-cluster MinIO
  bucket (actions-cache), using the MINIO_* credentials the runners already
  carry.

  sccache caches individual compilation units in object storage, so a warm build
  fetches only the objects it needs instead of moving a multi-gigabyte target
  directory. That matters here because the runners are ephemeral (nothing
  persists on disk) and GitHub's own cache evicts a Rust target dir under its
  10 GB per-repo limit — leaving cold eight-minute clippy builds at random. MinIO
  has no such ceiling and sits inside the cluster, so hits are local.

  Call once before the build. It installs sccache if absent, points it at MinIO,
  and exports RUSTC_WRAPPER for the cargo steps that follow. There is nothing to
  save afterwards — sccache writes through as the compiler runs.

inputs:
  version:
    description: sccache release to install when the runner does not already have it.
    required: false
    default: "0.8.2"
  key-prefix:
    description: >-
      Namespaces this repo's objects within the bucket. Defaults to the repo, so
      unrelated projects never collide or evict each other.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        SCCACHE_VERSION: ${{ inputs.version }}
        SCCACHE_KEY_PREFIX_INPUT: ${{ inputs.key-prefix }}
      run: |
        set -euo pipefail

        # No credentials means no shared cache. Build cold rather than fail — a
        # runner set that has not been wired for MinIO must still work.
        if [[ -z "${MINIO_ACCESS_KEY:-}" || -z "${MINIO_ENDPOINT:-}" ]]; then
          echo "cache-rust: MINIO_* not present on this runner — building without sccache."
          exit 0
        fi

        # Install sccache if the image does not already ship it. The static musl
        # build has no runtime deps and is ~10 MB; fetching it costs a second or
        # two against the minutes it saves.
        if ! command -v sccache >/dev/null 2>&1; then
          echo "cache-rust: installing sccache ${SCCACHE_VERSION}"
          arch="$(uname -m)"; case "$arch" in
            x86_64) triple="x86_64-unknown-linux-musl" ;;
            aarch64|arm64) triple="aarch64-unknown-linux-musl" ;;
            *) echo "cache-rust: no sccache build for ${arch} — building without it."; exit 0 ;;
          esac
          tarball="sccache-v${SCCACHE_VERSION}-${triple}"
          url="https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/${tarball}.tar.gz"
          if ! curl -fsSL "$url" -o /tmp/sccache.tgz; then
            echo "cache-rust: could not download sccache — building without it."
            exit 0
          fi
          tar -xzf /tmp/sccache.tgz -C /tmp
          # Prefer a PATH dir the runner owns; fall back to ~/.local/bin.
          dest="$HOME/.local/bin"; mkdir -p "$dest"
          install -m 0755 "/tmp/${tarball}/sccache" "$dest/sccache"
          echo "$dest" >> "$GITHUB_PATH"
          export PATH="$dest:$PATH"
        fi

        PREFIX="${SCCACHE_KEY_PREFIX_INPUT:-sccache/${GITHUB_REPOSITORY}}"

        # Persist the configuration for every step that follows in the job. sccache
        # reads these; RUSTC_WRAPPER is what makes cargo route rustc through it.
        {
          echo "RUSTC_WRAPPER=sccache"
          echo "SCCACHE_BUCKET=${MINIO_BUCKET:-actions-cache}"
          echo "SCCACHE_ENDPOINT=${MINIO_ENDPOINT}:${MINIO_PORT:-9000}"
          echo "SCCACHE_S3_USE_SSL=false"
          echo "SCCACHE_S3_KEY_PREFIX=${PREFIX}"
          echo "SCCACHE_REGION=us-east-1"
          echo "AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}"
          echo "AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}"
          # No EC2 metadata endpoint in the cluster; stop the S3 client stalling
          # on a probe for one.
          echo "AWS_EC2_METADATA_DISABLED=true"
          # sccache and cargo incremental fight — incremental keeps per-crate
          # state that defeats a shared object cache. The runners already set
          # this; assert it so a caller who did not still gets cache hits.
          echo "CARGO_INCREMENTAL=0"
        } >> "$GITHUB_ENV"

        # Start the server now with the config exported above, and prove it can
        # reach MinIO. A failure here is not fatal — the wrapper still compiles,
        # just without hits — but it should be visible, not silent.
        export RUSTC_WRAPPER=sccache \
          SCCACHE_BUCKET="${MINIO_BUCKET:-actions-cache}" \
          SCCACHE_ENDPOINT="${MINIO_ENDPOINT}:${MINIO_PORT:-9000}" \
          SCCACHE_S3_USE_SSL=false SCCACHE_S3_KEY_PREFIX="${PREFIX}" \
          SCCACHE_REGION=us-east-1 \
          AWS_ACCESS_KEY_ID="${MINIO_ACCESS_KEY}" \
          AWS_SECRET_ACCESS_KEY="${MINIO_SECRET_KEY}" \
          AWS_EC2_METADATA_DISABLED=true
        if sccache --start-server 2>/tmp/sccache-start.log; then
          echo "cache-rust: sccache serving from s3://${MINIO_BUCKET:-actions-cache}/${PREFIX}"
          sccache --show-stats 2>/dev/null | grep -iE "cache location|storage" || true
        else
          echo "cache-rust: sccache would not start — compiling without a cache."
          cat /tmp/sccache-start.log || true
        fi
